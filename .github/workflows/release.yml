name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to attach artifacts to (optional; leave empty to only upload workflow artifacts)"
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: cori

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install aarch64 Linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
            echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar"
          } >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked -p cori-cli --target ${{ matrix.target }}

      - name: Determine archive name
        id: pkg
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ -z "$version" || "$version" == "main" ]]; then
            version="$(cargo pkgid -p cori-cli | sed 's/.*[#@]//')"
          fi
          name="${BIN_NAME}-${version}-${{ matrix.target }}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging="${{ steps.pkg.outputs.name }}"
          mkdir -p "dist/$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/$staging/"
          cp README.md LICENSE* "dist/$staging/" 2>/dev/null || true
          (cd dist && tar czf "$staging.tar.gz" "$staging")
          shasum -a 256 "dist/$staging.tar.gz" > "dist/$staging.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "${{ steps.pkg.outputs.name }}"
          New-Item -ItemType Directory -Force -Path "dist/$staging" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "dist/$staging/"
          if (Test-Path "README.md") { Copy-Item "README.md" "dist/$staging/" }
          Get-ChildItem -Filter "LICENSE*" | ForEach-Object { Copy-Item $_.FullName "dist/$staging/" }
          Compress-Archive -Path "dist/$staging/*" -DestinationPath "dist/$staging.zip"
          (Get-FileHash "dist/$staging.zip" -Algorithm SHA256).Hash | Out-File "dist/$staging.zip.sha256" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
