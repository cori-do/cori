name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-build:
    name: Rust build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: ./.github/actions/setup-protoc
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf
      - name: cargo build (CLI + workspace, excluding desktop)
        # cori-console (Tauri) requires the bundled temporal sidecar
        # binary at console/src-tauri/binaries/temporal-<triple> to
        # build. The placeholder stubs committed for development are
        # not viable artefacts to ship. Build it from desktop-release.yml
        # where the real binary gets downloaded.
        run: cargo build --workspace --exclude cori-console --all-targets
      - name: cori --version
        run: cargo run -p cori-cli -- --version

  rust-lint-and-test:
    name: Rust fmt + clippy + test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: ./.github/actions/setup-protoc
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf
      - name: cargo clippy
        # cori-console excluded — same reason as the build job above.
        run: cargo clippy --workspace --exclude cori-console --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --exclude cori-console

  ts-build:
    name: TypeScript build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
