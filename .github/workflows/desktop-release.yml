name: Desktop release

# Builds Cori Console (Tauri v2 desktop app) installers for each
# supported platform. Triggered on tags like `desktop-v0.2.10` or
# manually via workflow_dispatch.
#
# IMPORTANT: signing + notarization require additional secrets that are
# *not* configured here — see TODO blocks below. Without them the
# produced artifacts are unsigned and will trigger Gatekeeper /
# SmartScreen warnings on download.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  TEMPORAL_VERSION: "1.7.0"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            temporal_asset: temporal_cli_REPLACE_VERSION_darwin_arm64.tar.gz
            temporal_sha: 88a59ea7b1a51309a873e2a914360865123d5b36528d55f8d7c34c6d79007fda
          - target: x86_64-apple-darwin
            os: macos-14
            temporal_asset: temporal_cli_REPLACE_VERSION_darwin_amd64.tar.gz
            temporal_sha: a289156e464bdbb667a125b5e94abeab98a74814771ea4828731970cab4e907c
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            temporal_asset: temporal_cli_REPLACE_VERSION_linux_amd64.tar.gz
            temporal_sha: 8b5de72e622f4ae062d0d5d948ca398de6212d63b2f25766a1cb810a3dc2d0ed
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            temporal_asset: temporal_cli_REPLACE_VERSION_windows_amd64.zip
            temporal_sha: ce84637dbf794d71e0c530d1b250edfb7b692784213e234f7d50ea310491e01a

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: console/pnpm-lock.yaml

      - name: Download Temporal CLI sidecar
        shell: bash
        env:
          TEMPORAL_ASSET: ${{ matrix.temporal_asset }}
          TEMPORAL_SHA: ${{ matrix.temporal_sha }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          asset="${TEMPORAL_ASSET//REPLACE_VERSION/${TEMPORAL_VERSION}}"
          url="https://github.com/temporalio/cli/releases/download/v${TEMPORAL_VERSION}/${asset}"
          workdir="$(mktemp -d)"
          cd "$workdir"
          echo "Downloading ${url}"
          curl -fL --retry 3 -o "${asset}" "${url}"

          if command -v sha256sum >/dev/null 2>&1; then
            actual=$(sha256sum "${asset}" | awk '{print $1}')
          else
            actual=$(shasum -a 256 "${asset}" | awk '{print $1}')
          fi
          if [ "${actual}" != "${TEMPORAL_SHA}" ]; then
            echo "SHA-256 mismatch for ${asset}: expected ${TEMPORAL_SHA}, got ${actual}" >&2
            exit 1
          fi

          case "${asset}" in
            *.zip)    unzip -q "${asset}" ;;
            *.tar.gz) tar -xzf "${asset}" ;;
            *) echo "Unsupported archive: ${asset}" >&2; exit 1 ;;
          esac

          dest_dir="${GITHUB_WORKSPACE}/console/src-tauri/binaries"
          mkdir -p "${dest_dir}"
          if [[ "${TARGET}" == *windows* ]]; then
            cp temporal.exe "${dest_dir}/temporal-${TARGET}.exe"
          else
            cp temporal "${dest_dir}/temporal-${TARGET}"
            chmod +x "${dest_dir}/temporal-${TARGET}"
          fi

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: console
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Build the Tauri app
        working-directory: console
        run: pnpm tauri build --target ${{ matrix.target }}

      # TODO: macOS signing + notarization — requires APPLE_CERTIFICATE,
      # APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_ID,
      # APPLE_PASSWORD, APPLE_TEAM_ID secrets. See
      # https://tauri.app/distribute/sign/macos/
      # TODO: Windows code signing — needs WINDOWS_CERTIFICATE,
      # WINDOWS_CERTIFICATE_PASSWORD; preferably an EV cert to avoid
      # SmartScreen warnings.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cori-console-${{ matrix.target }}
          path: |
            console/src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*.AppImage
            dist/**/*.deb
          generate_release_notes: true

      # TODO: update tauri-plugin-updater manifest at
      # https://cori.do/updates/latest.json once the updater signing
      # keypair is generated (`tauri signer generate`) and the public
      # key is hard-coded into tauri.conf.json's plugins.updater.pubkey.
