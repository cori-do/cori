name: Desktop release

# Builds Cori Console (Tauri v2 desktop app) installers for each
# supported platform. Triggered on tags like `desktop-v0.2.10` or
# manually via workflow_dispatch.
#
# macOS builds are signed + notarized when the APPLE_* repository
# secrets are configured (see the build step's env block). Windows
# signing is still a TODO — unsigned .msi installers will trigger
# SmartScreen warnings on download.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  TEMPORAL_VERSION: "1.7.0"
  # Keep in sync with scripts/install.sh's DEFAULT_DENO_VERSION.
  DENO_VERSION: "2.8.1"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            temporal_asset: temporal_cli_REPLACE_VERSION_darwin_arm64.tar.gz
            temporal_sha: 88a59ea7b1a51309a873e2a914360865123d5b36528d55f8d7c34c6d79007fda
          - target: x86_64-apple-darwin
            os: macos-14
            temporal_asset: temporal_cli_REPLACE_VERSION_darwin_amd64.tar.gz
            temporal_sha: a289156e464bdbb667a125b5e94abeab98a74814771ea4828731970cab4e907c
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            temporal_asset: temporal_cli_REPLACE_VERSION_linux_amd64.tar.gz
            temporal_sha: 8b5de72e622f4ae062d0d5d948ca398de6212d63b2f25766a1cb810a3dc2d0ed
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            temporal_asset: temporal_cli_REPLACE_VERSION_windows_amd64.zip
            temporal_sha: ce84637dbf794d71e0c530d1b250edfb7b692784213e234f7d50ea310491e01a

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches app version
        # Bundle filenames embed tauri.conf.json's `version`, and the
        # landing page + docs link to them under the tag's version. A
        # mismatched tag (desktop-v0.3.1 wrapping a 0.3.0 app) ships
        # assets nobody can construct a URL for — fail fast instead.
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#desktop-v}"
          app_version="$(jq -r .version console/src-tauri/tauri.conf.json)"
          if [ "${tag_version}" != "${app_version}" ]; then
            echo "Tag desktop-v${tag_version} does not match tauri.conf.json version ${app_version}." >&2
            echo "Bump console/src-tauri/tauri.conf.json (and console/package.json) before tagging." >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: console/pnpm-lock.yaml

      - name: Download Temporal CLI sidecar
        shell: bash
        env:
          TEMPORAL_ASSET: ${{ matrix.temporal_asset }}
          TEMPORAL_SHA: ${{ matrix.temporal_sha }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          asset="${TEMPORAL_ASSET//REPLACE_VERSION/${TEMPORAL_VERSION}}"
          url="https://github.com/temporalio/cli/releases/download/v${TEMPORAL_VERSION}/${asset}"
          workdir="$(mktemp -d)"
          cd "$workdir"
          echo "Downloading ${url}"
          curl -fL --retry 3 -o "${asset}" "${url}"

          if command -v sha256sum >/dev/null 2>&1; then
            actual=$(sha256sum "${asset}" | awk '{print $1}')
          else
            actual=$(shasum -a 256 "${asset}" | awk '{print $1}')
          fi
          if [ "${actual}" != "${TEMPORAL_SHA}" ]; then
            echo "SHA-256 mismatch for ${asset}: expected ${TEMPORAL_SHA}, got ${actual}" >&2
            exit 1
          fi

          case "${asset}" in
            *.zip)    unzip -q "${asset}" ;;
            *.tar.gz) tar -xzf "${asset}" ;;
            *) echo "Unsupported archive: ${asset}" >&2; exit 1 ;;
          esac

          dest_dir="${GITHUB_WORKSPACE}/console/src-tauri/binaries"
          mkdir -p "${dest_dir}"
          if [[ "${TARGET}" == *windows* ]]; then
            cp temporal.exe "${dest_dir}/temporal-${TARGET}.exe"
          else
            cp temporal "${dest_dir}/temporal-${TARGET}"
            chmod +x "${dest_dir}/temporal-${TARGET}"
          fi

      - name: Download Deno sidecar
        # Mirrors the Temporal sidecar step. Deno publishes per-target
        # `.zip` assets whose names already match the cargo target
        # triple, so the asset is computed from $TARGET directly.
        # Integrity is verified against the publisher's `.sha256sum`
        # file (same approach as scripts/install.sh) rather than a
        # hard-coded matrix entry — when bumping DENO_VERSION you do
        # not need to re-pin per-platform SHAs.
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          asset="deno-${TARGET}.zip"
          base="https://github.com/denoland/deno/releases/download/v${DENO_VERSION}"
          url="${base}/${asset}"
          workdir="$(mktemp -d)"
          cd "$workdir"
          echo "Downloading ${url}"
          curl -fL --retry 3 -o "${asset}" "${url}"

          echo "Downloading ${url}.sha256sum"
          curl -fL --retry 3 -o "${asset}.sha256sum" "${url}.sha256sum"
          # Deno's Windows .sha256sum is PowerShell Get-FileHash output
          # (multi-line `Algorithm/Hash/Path` with uppercase hex), not the
          # standard `<hash>  <filename>` format used on Linux/macOS. Grep
          # any 64-char hex sequence and lowercase it to handle both.
          expected=$(grep -oiE '[a-f0-9]{64}' "${asset}.sha256sum" | head -n1 | tr 'A-Z' 'a-z')
          if [ -z "${expected}" ]; then
            echo "Could not parse expected SHA from ${asset}.sha256sum" >&2
            exit 1
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            actual=$(sha256sum "${asset}" | awk '{print $1}')
          else
            actual=$(shasum -a 256 "${asset}" | awk '{print $1}')
          fi
          if [ "${actual}" != "${expected}" ]; then
            echo "SHA-256 mismatch for ${asset}: expected ${expected}, got ${actual}" >&2
            exit 1
          fi

          unzip -q "${asset}"

          dest_dir="${GITHUB_WORKSPACE}/console/src-tauri/binaries"
          mkdir -p "${dest_dir}"
          if [[ "${TARGET}" == *windows* ]]; then
            cp deno.exe "${dest_dir}/deno-${TARGET}.exe"
          else
            cp deno "${dest_dir}/deno-${TARGET}"
            chmod +x "${dest_dir}/deno-${TARGET}"
          fi

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: console
        run: pnpm install --frozen-lockfile

      - name: Build cori CLI sidecar
        # Bundled into the app as `cori-cli` (the bare name would
        # collide with the `Cori` app binary on case-insensitive
        # filesystems) and exposed as `cori` on the user's PATH by the
        # launcher's "Install CLI" action. Built before the Tauri app
        # so it shares the same rust-cache and target dir.
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          cargo build --release -p cori-cli --target "${TARGET}"

          dest_dir="${GITHUB_WORKSPACE}/console/src-tauri/binaries"
          mkdir -p "${dest_dir}"
          if [[ "${TARGET}" == *windows* ]]; then
            cp "target/${TARGET}/release/cori.exe" "${dest_dir}/cori-cli-${TARGET}.exe"
          else
            cp "target/${TARGET}/release/cori" "${dest_dir}/cori-cli-${TARGET}"
            chmod +x "${dest_dir}/cori-cli-${TARGET}"
          fi

      - name: Write App Store Connect API key
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Build the Tauri app
        working-directory: console
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          # macOS signing + notarization. Tauri's bundler picks these up
          # automatically: it imports the base64 .p12 into a temporary
          # keychain, codesigns app + sidecars with the hardened runtime,
          # then notarizes (via the App Store Connect API key) and staples
          # the DMG. Empty on Linux/Windows runners, where they are
          # ignored. See https://tauri.app/distribute/sign/macos/
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8

      - name: Verify macOS signature + notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app=$(find target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name '*.app' | head -n1)
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose "$app"

      # TODO: Windows code signing — needs WINDOWS_CERTIFICATE,
      # WINDOWS_CERTIFICATE_PASSWORD; preferably an EV cert to avoid
      # SmartScreen warnings.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cori-console-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*.AppImage
            dist/**/*.deb
          generate_release_notes: true

      # TODO: update tauri-plugin-updater manifest at
      # https://cori.do/updates/latest.json once the updater signing
      # keypair is generated (`tauri signer generate`) and the public
      # key is hard-coded into tauri.conf.json's plugins.updater.pubkey.
