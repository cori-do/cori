name: Desktop release

# Builds Cori Console (Tauri v2 desktop app) installers for each
# supported platform. Triggered on tags like `desktop-v0.2.10` or
# manually via workflow_dispatch.
#
# IMPORTANT: signing + notarization require additional secrets that are
# *not* configured here — see TODO blocks below. Without them the
# produced artifacts are unsigned and will trigger Gatekeeper /
# SmartScreen warnings on download.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            temporal_asset: temporal_cli_REPLACE_VERSION_darwin_arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            temporal_asset: temporal_cli_REPLACE_VERSION_darwin_amd64.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            temporal_asset: temporal_cli_REPLACE_VERSION_linux_amd64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            temporal_asset: temporal_cli_REPLACE_VERSION_windows_amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: console/pnpm-lock.yaml

      # TODO: replace REPLACE_VERSION above with the procured Temporal
      # CLI version, then download + verify SHA + extract here. Until
      # then the build will fall back to the placeholder stub in
      # console/src-tauri/binaries/ and produce a non-functional bundle.
      - name: Verify sidecar binary present
        shell: bash
        run: |
          test -f console/src-tauri/binaries/temporal-${{ matrix.target }}* \
            || (echo "Missing sidecar binary for ${{ matrix.target }}"; exit 1)

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: console
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Build the Tauri app
        working-directory: console
        run: pnpm tauri build --target ${{ matrix.target }}

      # TODO: macOS signing + notarization — requires APPLE_CERTIFICATE,
      # APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_ID,
      # APPLE_PASSWORD, APPLE_TEAM_ID secrets. See
      # https://tauri.app/distribute/sign/macos/
      # TODO: Windows code signing — needs WINDOWS_CERTIFICATE,
      # WINDOWS_CERTIFICATE_PASSWORD; preferably an EV cert to avoid
      # SmartScreen warnings.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cori-console-${{ matrix.target }}
          path: |
            console/src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*.AppImage
            dist/**/*.deb
          generate_release_notes: true

      # TODO: update tauri-plugin-updater manifest at
      # https://cori.do/updates/latest.json once the updater signing
      # keypair is generated (`tauri signer generate`) and the public
      # key is hard-coded into tauri.conf.json's plugins.updater.pubkey.
